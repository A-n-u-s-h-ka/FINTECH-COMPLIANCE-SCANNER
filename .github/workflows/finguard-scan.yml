name: FinGuard Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip repository (exclude heavy folders)
        run: |
          zip -r repo.zip . \
            -x "*.git*" "node_modules/*" "frontend/node_modules/*" "venv/*" "dist/*" "build/*" "__pycache__/*"

      - name: Call FinGuard backend API
        env:
          BACKEND_URL: ${{ secrets.FINGUARD_API_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "FINGUARD_API_URL is not set. Configure it as a repository secret pointing to your FinGuard backend (e.g. https://pbl-2-1dlb.onrender.com)." >&2
            exit 1
          fi

          echo "Calling FinGuard at: ${BACKEND_URL}/api/scan/"

          STATUS=$(curl -sS -L -w "%{http_code}" -o finguard-result.json \
            -X POST \
            -F "file=@repo.zip" \
            "${BACKEND_URL%/}/api/scan/")

          echo "HTTP status: ${STATUS}"
          echo "Raw response from FinGuard:"
          cat finguard-result.json || true

            if [ "${STATUS}" != "200" ]; then
            echo "FinGuard returned non-200 HTTP status ${STATUS}"
            exit 1
            fi

            python scripts/print_finguard_summary.py

      - name: Upload JSON result artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: finguard-result
          path: finguard-result.json

      - name: Comment on PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let result;
            try {
              result = JSON.parse(fs.readFileSync('finguard-result.json', 'utf8'));
            } catch (e) {
              core.warning(`Could not read finguard-result.json: ${e}`);
              result = { risk_score: 'N/A', decision: 'unknown', summary: { by_severity: {} } };
            }

            const bySev = result.summary?.by_severity || {};

            const body = `## 🔒 FinGuard Security Scan Results

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${bySev.CRITICAL || 0} |
            | 🟠 High | ${bySev.HIGH || 0} |
            | 🟡 Medium | ${bySev.MEDIUM || 0} |
            | 🟢 Low | ${bySev.LOW || 0} |

            **Risk Score:** ${result.risk_score}/100
            **Decision:** ${result.decision}

            
            <details>
            <summary>Raw JSON output</summary>

            
            
            \`${JSON.stringify(result)}\`
            
            </details>

            ---
            *Powered by FinGuard Compliance Scanner*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Optional: send email on BLOCK decision using an SMTP-based action
      # Configure secrets like MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_TO before enabling.
      # - name: Send email notification on BLOCK
      #   if: steps.call_api.outputs.decision == 'BLOCK'
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: ${{ secrets.MAIL_HOST }}
      #     server_port: ${{ secrets.MAIL_PORT }}
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     subject: "FinGuard BLOCK decision for ${{ github.repository }}"
      #     to: ${{ secrets.MAIL_TO }}
      #     from: "FinGuard Bot <${{ secrets.MAIL_FROM }}>"
      #     content_type: text/plain
      #     body: "FinGuard decision: BLOCK (score ${{ steps.call_api.outputs.score }}/100). See finguard-result.json artifact for details."
